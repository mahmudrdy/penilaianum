<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Penilaian UM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=3">
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
        .bg-animated {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #064e3b, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
    </style>
</head>
<body class="bg-animated min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">
    <div class="relative w-full max-w-md">
        <!-- Decorative blobs -->
        <div class="absolute top-0 -left-4 w-72 h-72 bg-emerald-400 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-blob"></div>
        <div class="absolute top-0 -right-4 w-72 h-72 bg-teal-400 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-20 w-72 h-72 bg-emerald-600 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-blob animation-delay-4000"></div>
        
        <div class="glass-panel p-8 sm:p-10 rounded-[2rem] relative z-10 transition-all duration-300 hover:shadow-2xl">
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-gradient-to-tr from-emerald-500 to-teal-400 rounded-2xl mx-auto flex items-center justify-center transform rotate-12 shadow-lg mb-6 shadow-emerald-500/30">
                    <i class="fa-solid fa-graduation-cap text-4xl text-white transform -rotate-12"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight mb-2">Portal <span class="text-emerald-600">Terpadu</span></h1>
                <p class="text-slate-500 font-medium">Sistem Penilaian Ujian Madrasah</p>
            </div>
            
            <form id="loginForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700">Token Akses Guru</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-emerald-500 transition-colors">
                            <i class="fa-solid fa-key"></i>
                        </div>
                        <input type="text" id="token" required 
                               class="block w-full pl-11 pr-4 py-3.5 bg-white/50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all uppercase tracking-widest font-mono text-center font-bold" 
                               placeholder="TKN-XXXXXX"
                               maxlength="10">
                    </div>
                    <p class="text-xs text-slate-400 mt-2 text-center">*Dapatkan token ini dari Administrator</p>
                </div>
                
                <button type="submit" id="loginBtn" class="w-full flex justify-center py-3.5 px-4 rounded-xl text-sm font-bold text-white bg-slate-900 border border-transparent shadow-lg hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 transition-all active:scale-[0.98]">
                    Masuk ke Sistem
                </button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK (Modular API) - v10.9.0 -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/login.js"></script>
</body>
</html>
